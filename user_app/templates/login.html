<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>World IT - Авторизація</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background: #FFFFFF;
            position: relative;
        }

        /* Главный контейнер */
        .page {
            width: 500px;
            max-width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            padding: 20px 0;
        }

        /* Логотип */
        .logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .logo img {
            width: 212px;
            height: 28px;
            display: block;
        }

        /* Заголовок */
        .title {
            font-size: 24px;
            font-weight: 600;
            line-height: 32px;
            letter-spacing: -0.025em;
            color: #070A1C;
            text-align: center;
        }

        /* Контент */
        .content {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
        }

        .subtitle {
            font-size: 14px;
            line-height: 20px;
            color: #71717A;
            text-align: center;
            width: 100%;
        }

        /* Форма */
        .form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input {
            width: 100%;
            height: 36px;
            padding: 4px 12px;
            border-radius: 6px;
            border: 1px solid #E2E1EC;
            background: #FFFFFF;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #070A1C;
        }

        .input::placeholder {
            color: #B3B3C5;
        }

        .input:focus {
            outline: none;
            border-color: #070A1C;
        }

        /* Кнопка */
        .button {
            height: 36px;
            border-radius: 6px;
            border: none;
            background: #070A1C;
            color: #FAF8FF;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }

        .button:hover {
            opacity: 0.9;
        }

        /* Кнопка "Реєстрація" */
        .register-button {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 76px;
            height: 36px;
            background-color: #FFFFFF;
            color: #000033;
            border: 1px solid #E5E7EB;
            border-radius: 6px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
        }

        .register-button:hover {
            background-color: #F9FAFB;
        }

        /* Изображение внизу */
        .chatgpt {
            margin-top: 50px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .chatgpt img {
            width: 400px;
            max-width: 100%;
            height: auto;
        }

        /* Ссылка "Забули пароль?" */
        .forgot-link {
            font-size: 14px;
            color: #4DA6FF;
            text-decoration: none;
            text-align: center;
            margin-top: 8px;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        /* ========== АДАПТИВ ДЛЯ ТЕЛЕФОНОВ ========== */
        @media (max-width: 500px) {
            body {
                padding: 16px;
            }

            .page {
                width: 100%;
                max-width: 393px;
                gap: 32px;
                padding: 0;
            }

            .logo img {
                width: 180px;
                height: auto;
            }

            .title {
                font-size: 22px;
                line-height: 28px;
            }

            .subtitle {
                font-size: 14px;
                line-height: 20px;
            }

            .input {
                height: 40px;
                font-size: 16px;
            }

            .button {
                height: 44px;
                font-size: 16px;
            }

            .register-button {
                top: 16px;
                right: 16px;
                width: 70px;
                height: 32px;
                font-size: 13px;
                padding: 6px 12px;
            }

            .chatgpt {
                margin-top: 30px;
            }

            .chatgpt img {
                width: 100%;
                max-width: 280px;
            }

            .forgot-link {
                font-size: 13px;
            }
        }

        /* Для очень маленьких телефонов (iPhone SE) */
        @media (max-width: 380px) {
            .logo img {
                width: 150px;
            }

            .title {
                font-size: 20px;
            }

            .subtitle {
                font-size: 13px;
            }

            .input {
                height: 36px;
                font-size: 14px;
            }

            .button {
                height: 40px;
                font-size: 14px;
            }

            .register-button {
                width: 60px;
                height: 28px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<div class="page">

    <!-- Логотип -->
    <div class="logo">
        <img src="{{ url_for('user_app.static', filename='logo.png') }}" alt="World IT Logo">
    </div>

    <!-- Заголовок -->
    <h1 class="title">
        Авторизуватися
    </h1>

    <div class="content">
        <p class="subtitle">
            Введіть вашу електронну пошту нижче, щоб увійти в свій обліковий запис
        </p>

        <form class="form" method="POST" action="/login">
            <input class="input" type="email" name="email" placeholder="name@example.com" required>
            <input class="input" type="password" name="password" placeholder="Пароль" required>

            <button class="button" type="submit">
                Увійти в аккаунт
            </button>
        </form>

        <a href="#" class="forgot-link">Забули пароль?</a>
    </div>

    <!-- Изображение внизу -->
    <div class="chatgpt">
        <img src="{{ url_for('user_app.static', filename='chatgpt.png') }}" alt="ChatGPT Integration">
    </div>

    <!-- Кнопка "Реєстрація" -->
    <a href="/" class="register-button">
        Реєстрація
    </a>

</div>

</body>
</html>
