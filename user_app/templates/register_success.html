<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>World IT - Успіх</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background: #FFFFFF;
            position: relative;
        }

        /* Главный контейнер */
        .page {
            width: 500px;
            max-width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            padding: 20px 0;
        }

        /* Логотип */
        .logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .logo img {
            width: 212px;
            height: 28px;
            display: block;
        }

        /* Контейнер з текстом */
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0px;
            gap: 16px;
            width: 100%;
            max-width: 500px;
        }

        /* Заголовок */
        .title {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 24px;
            line-height: 32px;
            letter-spacing: -0.025em;
            color: #070A1C;
            text-align: center;
        }

        /* Сообщение */
        .message {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 16px;
            line-height: 28px;
            text-align: center;
            color: #0F172A;
            width: 100%;
            max-width: 500px;
        }

        /* Контент */
        .content {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
        }

        /* Кнопка "Відкрити електронну пошту" */
        .button {
            height: 36px;
            border-radius: 6px;
            border: none;
            background: #070A1C;
            color: #FAF8FF;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
            width: 100%;
            text-decoration: none;
        }

        .button:hover {
            opacity: 0.9;
        }

        /* Кнопка "Увійти" */
        .login-button {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 76px;
            height: 36px;
            background-color: #FFFFFF;
            color: #000033;
            border: 1px solid #E5E7EB;
            border-radius: 6px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
        }

        .login-button:hover {
            background-color: #F9FAFB;
        }

        /* Изображение внизу */
        .chatgpt {
            margin-top: 50px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .chatgpt img {
            width: 400px;
            max-width: 100%;
            height: auto;
        }

        /* ========== АДАПТИВ ДЛЯ ТЕЛЕФОНОВ ========== */
        @media (max-width: 500px) {
            body {
                padding: 16px;
            }

            .page {
                width: 100%;
                max-width: 393px;
                gap: 32px;
                padding: 0;
            }

            .logo img {
                width: 180px;
                height: auto;
            }

            .title {
                font-size: 22px;
                line-height: 28px;
            }

            .message {
                font-size: 15px;
                line-height: 24px;
                padding: 0 16px;
            }

            .button {
                height: 44px;
                font-size: 16px;
            }

            .login-button {
                top: 16px;
                right: 16px;
                width: 70px;
                height: 32px;
                font-size: 13px;
                padding: 6px 12px;
            }

            .chatgpt {
                margin-top: 30px;
            }

            .chatgpt img {
                width: 100%;
                max-width: 280px;
            }
        }

        /* Для очень маленьких телефонов (iPhone SE) */
        @media (max-width: 380px) {
            .logo img {
                width: 150px;
            }

            .title {
                font-size: 20px;
            }

            .message {
                font-size: 14px;
                line-height: 22px;
            }

            .button {
                height: 40px;
                font-size: 14px;
            }

            .login-button {
                width: 60px;
                height: 28px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<div class="page">

    <!-- Логотип -->
    <div class="logo">
        <img src="{{ url_for('user_app.static', filename='logo.png') }}" alt="World IT Logo">
    </div>

    <!-- Контейнер з текстом -->
    <div class="container">
        <h2 class="title">Успіх</h2>
        <p class="message">
            Ми надіслали вам електронний лист з магічним посиланням для підтвердження вашого облікового запису. 
            Будь ласка, перевірте свою поштову скриньку та натисніть на посилання.
        </p>
    </div>

    <!-- Кнопка "Відкрити електронну пошту" -->
    <div class="content">
        <a href="https://mail.google.com/" target="_blank" class="button">
            Відкрити електронну пошту
        </a>
    </div>

    <!-- Изображение внизу -->
    <div class="chatgpt">
        <img src="{{ url_for('user_app.static', filename='chatgpt.png') }}" alt="ChatGPT Integration">
    </div>

    <!-- Кнопка "Увійти" -->
    <a href="/login" class="login-button">
        Увійти
    </a>

</div>

</body>
</html>
