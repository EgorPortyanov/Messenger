<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>World IT - Створити обліковий запис</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background: #FFFFFF;
            position: relative;
        }

        /* Главный контейнер*/
        .page {
            width: 500px;
            max-width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            padding: 20px 0;
        }

        /* Логотип */
        .logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .logo img {
            width: 212px;
            height: auto;
            display: block;
        }

        /* Заголовок */
        .title {
            font-size: 24px;
            font-weight: 600;
            line-height: 32px;
            letter-spacing: -0.025em;
            color: #070A1C;
            text-align: center;
        }

        /* Контент */
        .content {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
        }

        /* Подзаголовок */
        .subtitle {
            font-size: 14px;
            line-height: 20px;
            color: #71717A;
            text-align: center;
            width: 100%;
        }

        /* Форма */
        .form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Група поля */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* Поле введення */
        .input {
            width: 100%;
            height: 36px;
            padding: 4px 12px;
            border-radius: 6px;
            border: 1px solid #E2E1EC;
            background: #FFFFFF;
            box-shadow: 0px 1px 2px rgba(0, 0, 0, 0.05);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #070A1C;
        }

        .input::placeholder {
            color: #B3B3C5;
        }

        .input:focus {
            outline: none;
            border-color: #070A1C;
        }

        /* Кнопка реестрации */
        .button {
            height: 36px;
            border-radius: 6px;
            border: none;
            background: #070A1C;
            color: #FAF8FF;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
            margin-top: 8px;
        }

        .button:hover {
            opacity: 0.9;
        }

        /* Кнопка "Увійти" */
        .login-button {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 76px;
            height: 36px;
            background-color: #FFFFFF;
            color: #070A1C;
            border: 1px solid #E5E7EB;
            border-radius: 6px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
        }

        .login-button:hover {
            background-color: #F9FAFB;
        }

        /* Умови використання */
        .terms {
            font-size: 14px;
            line-height: 20px;
            text-align: center;
            color: #B3B3C5;
            margin-top: 8px;
        }

        .terms a {
            color: #070A1C;
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        /* Изображение внизу */
        .chatgpt {
            margin-top: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .chatgpt img {
            width: 383px;
            max-width: 100%;
            height: auto;
        }

        /* ========== АДАПТИВ ДЛЯ ТЕЛЕФОНОВ ========== */
        @media (max-width: 500px) {
            body {
                padding: 16px;
            }

            .page {
                width: 100%;
                max-width: 393px;
                gap: 32px;
                padding: 0;
            }

            .logo img {
                width: 180px;
            }

            .title {
                font-size: 22px;
                line-height: 28px;
            }

            .subtitle {
                font-size: 14px;
                line-height: 20px;
            }

            .input {
                height: 40px;
                font-size: 16px;
            }

            .button {
                height: 44px;
                font-size: 16px;
            }

            .login-button {
                top: 16px;
                right: 16px;
                width: 70px;
                height: 32px;
                font-size: 13px;
                padding: 6px 12px;
            }

            .terms {
                font-size: 12px;
                line-height: 18px;
            }

            .chatgpt img {
                width: 100%;
                max-width: 280px;
            }
        }

        /* Для очень маленьких телефонов (iPhone SE) */
        @media (max-width: 380px) {
            .logo img {
                width: 150px;
            }

            .title {
                font-size: 20px;
            }

            .subtitle {
                font-size: 13px;
            }

            .button {
                height: 40px;
            }

            .login-button {
                width: 60px;
                height: 28px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<div class="page">

    <!-- Логотип -->
    <div class="logo">
        <img src="{{ url_for('user_app.static', filename='logo.png') }}" alt="World IT Logo">
    </div>

    <!-- Заголовок -->
    <h1 class="title">
        Створити обліковий запис
    </h1>

    <div class="content">
        <!-- Подзаголовок -->
        <p class="subtitle">
            Введіть вашу електронну пошту нижче, щоб створити обліковий запис
        </p>

        <form class="form" method="POST" action="/">
            <!-- Поле: Email -->
            <div class="input-group">
                <input class="input" type="email" name="email" placeholder="name@example.com" required>
            </div>

            <!-- Подзаголовок -->
            <p class="subtitle">
                Задайте ваш пароль нижче, щоб створити обліковий запис
            </p>

            <!-- Поле: Пароль -->
            <div class="input-group">
                <input class="input" type="password" name="password" placeholder="****************" required>
            </div>

            <!-- Подзаголовок -->
            <p class="subtitle">
                Проверка пароля
            </p>

            <!-- Поле: Проверка пароля -->
            <div class="input-group">
                <input class="input" type="password" name="confirm_password" placeholder="****************" required>
            </div>

            <!-- Кнопка -->
            <button class="button" type="submit">
                Зареєструватись
            </button>
        </form>

        <!-- Умови -->
        <div class="terms">
            Реєструючись, ви погоджуєтесь з <a href="#">Умовами використання</a> та <a href="#">Політикою конфіденційності</a>
        </div>
    </div>

    <!-- Изображение внизу -->
    <div class="chatgpt">
        <img src="{{ url_for('user_app.static', filename='chatgpt.png') }}" alt="ChatGPT Integration">
    </div>

    <!-- Кнопка "Увійти" -->
    <a href="/login" class="login-button">
        Увійти
    </a>

</div>

</body>
</html>
