<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>World IT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            background: #FFFFFF;
        }

        .frame {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            width: 500px;
            max-width: 90%;
            padding: 20px 0;
        }

        .logo-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .logo-image {
            width: 212px;
            height: auto;
            display: block;
        }

        .logo-text {
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.1em;
            color: #070A1C;
        }

        .title-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .title {
            display: flex;
            font-weight: 600;
            font-size: 24px;
            line-height: 32px;
            letter-spacing: -0.025em;
            color: #070A1C;
            text-align: center;
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            width: 100%;
        }

        .subtitle {
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 400;
            font-size: 14px;
            line-height: 20px;
            color: #71717A;
            text-align: center;
            width: 100%;
        }

        .form {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .input {
            display: flex;
            width: 100%;
            padding: 8px 12px;
            background: #FFFFFF;
            border: 1px solid #E2E1EC;
            box-shadow: 0px 1px 2px rgba(0, 0, 0, 0.05);
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 14px;
            line-height: 20px;
            color: #070A1C;
        }

        .input::placeholder {
            color: #B3B3C5;
        }

        .input:focus {
            outline: none;
            border-color: #070A1C;
        }

        .button {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px 16px;
            gap: 8px;
            width: 100%;
            background: #070A1C;
            box-shadow: 0px 1px 2px rgba(0, 0, 0, 0.05);
            border-radius: 6px;
            color: #FAF8FF;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 14px;
            line-height: 20px;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .button:hover {
            opacity: 0.9;
        }

        .terms {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
            width: 100%;
            font-weight: 400;
            font-size: 12px;
            line-height: 18px;
            text-align: center;
            color: #B3B3C5;
        }

        .terms a {
            display: inline-flex;
            color: #070A1C;
            text-decoration: none;
            font-weight: 500;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        .terms-text {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
        }
    </style>
</head>
<body>

<div class="frame">

    <div class="logo-wrapper">
        <img src="images/logo.png" alt="World IT" class="logo-image">
        <span class="logo-text">WORLD IT</span>
    </div>

    <div class="title-container">
        <h1 class="title">Створити обліковий запис</h1>
    </div>

    <div class="content">
        <p class="subtitle">
            Введіть вашу електронну пошту нижче, щоб створити обліковий запис
        </p>

        <div class="form">
            <div class="form-group">
                <div class="input-wrapper">
                    <input class="input" type="email" placeholder="name@example.com">
                </div>
                <div class="input-wrapper">
                    <input class="input" type="password" placeholder="********">
                </div>
                <button class="button">
                    Надіслати код підтвердження
                </button>
            </div>
        </div>
    </div>

    <div class="terms">
        <span>Натискаючи «Продовжити», ви погоджуєтеся з</span>
        <div class="terms-text">
            <a href="#">Умовами обслуговування</a>
            <span>та</span>
            <a href="#">Політикою конфіденційності</a>
        </div>
    </div>

</div>

</body>
</html>
