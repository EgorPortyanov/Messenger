<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>World IT - Створити обліковий запис</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background: #FFFFFF;
            position: relative;
        }

        /* Головний контейнер */
        .page {
            width: 500px;
            max-width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        /* Логотип */
        .logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .logo img {
            width: 212px;
            height: auto;
            display: block;
        }

        /* Заголовок */
        .title {
            font-size: 24px;
            font-weight: 600;
            line-height: 32px;
            letter-spacing: -0.025em;
            color: #070A1C;
            text-align: center;
        }

        /* Контент */
        .content {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
        }

        /* Підзаголовок */
        .subtitle {
            font-size: 14px;
            line-height: 20px;
            color: #71717A;
            text-align: left;  /* Змінено з center на left */
            width: 100%;       /* Додано для повної ширини */
        }

        /* Форма */
        .form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Група поля з підписом */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* Підпис над полем */
        .input-label {
            font-size: 14px;
            font-weight: 400;
            line-height: 20px;
            color: #71717A;
        }

        /* Поле введення */
        .input {
            width: 100%;
            height: 36px;
            padding: 4px 12px;
            border-radius: 6px;
            border: 1px solid #E2E1EC;
            background: #FFFFFF;
            box-shadow: 0px 1px 2px rgba(0, 0, 0, 0.05);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #070A1C;
        }

        .input::placeholder {
            color: #B3B3C5;
        }

        .input:focus {
            outline: none;
            border-color: #070A1C;
        }

        /* Кнопка */
        .button {
            height: 36px;
            border-radius: 6px;
            border: none;
            background: #070A1C;
            color: #FAF8FF;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
            margin-top: 8px;
        }

        .button:hover {
            opacity: 0.9;
        }

        /* Кнопка "Увійти" */
        .login-button {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 76px;
            height: 36px;
            background-color: #FFFFFF;
            color: #070A1C;
            border: 1px solid #E5E7EB;
            border-radius: 6px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
        }

        .login-button:hover {
            background-color: #F9FAFB;
        }

        /* ChatGPT зображення - внизу */
        .chatgpt {
            margin-top: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .chatgpt img {
            width: 400px;
            max-width: 100%;
            height: auto;
        }

        /* Умови використання (за бажанням) */
        .terms {
            font-size: 12px;
            line-height: 18px;
            text-align: center;
            color: #B3B3C5;
            margin-top: 8px;
        }

        .terms a {
            color: #070A1C;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="page">

    <!-- Логотип -->
    <div class="logo">
        <img src="{{ url_for('user_app.static', filename='logo.png') }}" alt="World IT Logo">
    </div>

    <!-- Заголовок -->
    <h1 class="title">
        Створити обліковий запис
    </h1>

    <div class="content">
        <!-- Перший підзаголовок -->
        <p class="subtitle">
            Введіть вашу електронну пошту нижче, щоб створити обліковий запис
        </p>

        <form class="form" method="POST" action="/">
            <!-- Поле: Email -->
            <div class="input-group">
                <input class="input" type="email" name="email" placeholder="name@example.com" required>
            </div>

            <!-- Другий підзаголовок -->
            <p class="subtitle">
                Задайте ваш пароль нижче, щоб створити обліковий запис
            </p>

            <!-- Поле: Пароль -->
            <div class="input-group">
                <input class="input" type="password" name="password" placeholder="****************" required>
            </div>

            <!-- Третій підзаголовок -->
            <p class="subtitle">
                Перевірка паролю
            </p>

            <!-- Поле: Перевірка паролю -->
            <div class="input-group">
                <input class="input" type="password" name="confirm_password" placeholder="****************" required>
            </div>

            <!-- Кнопка -->
            <button class="button" type="submit">
                Надіслати код підтвердження
            </button>
        </form>
    </div>

    <!-- ChatGPT зображення внизу -->
    <div class="chatgpt">
        <img src="{{ url_for('user_app.static', filename='chatgpt.png') }}" alt="ChatGPT Integration">
    </div>

    <!-- Кнопка "Увійти" -->
    <a href="/login" class="login-button">
        Увійти
    </a>

</div>

</body>
</html>
